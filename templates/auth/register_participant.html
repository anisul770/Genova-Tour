{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 bg-white rounded">
            <h2 class="fw-bold text-dark text-center mb-2">Tourist Account Signup</h2>
            <p class="text-muted text-center small mb-4">Create a free profile to instantly secure booking access slots.</p>
            
            <form method="POST" action="{{ url_for('auth.register_participant') }}">
                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">First Name</label>
                        <input type="text" name="first_name" required class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Last Name</label>
                        <input type="text" name="last_name" required class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Email Address</label>
                    <input type="email" name="email" required class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" required class="form-control">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Create My Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
