{% extends 'base.html' %}
{% block login %}
    active
{% endblock login %}
{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 bg-white rounded">
            <h2 class="fw-bold text-dark text-center mb-4">Account Sign In</h2>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">Email Address</label>
                    <input type="email" name="email" required class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">Authenticate Session</button>
            </form>
            <div class="text-center mt-4 border-top pt-3">
                <p class="small text-muted mb-1">Don't have an account yet?</p>
                <a href="{{ url_for('auth.register_participant') }}" class="text-success text-decoration-none fw-semibold me-3">Register as Tourist</a>
                <a href="{{ url_for('auth.register_guide') }}" class="text-success text-decoration-none fw-semibold">Become a Guide</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
