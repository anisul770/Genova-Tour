{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold text-danger mb-1">Post-Tour Audit Report</h3>
            <p class="text-muted small mb-4">Declare verified metrics for <strong>{{ tour.title }}</strong> executed on <strong>{{ date_str }}</strong>.</p>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Actual Headcount Verification (Total Attendees Present)</label>
                    <input type="number" name="actual_count" required min="0" class="form-control" placeholder="Count individual physical tourists verified">
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small">Attendance Group Photo Confirmation Asset</label>
                    <p class="text-muted text-xs mb-2">Upload a physical snapshot verifying operations took place at the landmark base coordinates.</p>
                    <input type="file" name="report_photo" required class="form-control">
                </div>

                <div class="d-flex gap-2 justify-content-end border-top pt-3">
                    <a href="{{ url_for('guides.dashboard') }}" class="btn btn-outline-secondary btn-sm fw-bold">Discard</a>
                    <button type="submit" class="btn btn-danger btn-sm fw-bold px-4 shadow-sm">Authorize & Commit Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
